<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetch Api</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div id="home">
      
      <input type="text" placeholder="Type pokemon name" id="pokemonName">
      <button id="getPokemon">
        <img src="images/search.svg" alt="Search" class="search-img">
      </button>
      
      
    </div>
    <div id="card">
      <div id="image-card">
        <img src="" alt="Pokemon" id="pokemonImage">
      </div>
      <div id="about-card">
        <h2 id="name"></h2>
        
        <div id="stats">
          <h3>STATS</h3>
          <ul>
            <li >HP<span id="hp"></span></li>
            <li >Attack<span id="attack"></span></li>
            <li >Defense<span id="defense"></span></li>
            <li >Sp.Atk<span id="sp.atk"></span></li>
            <li >Sp.Def<span id="sp.def"></span></li>
            <li >Speed<span id="speed"></span></li>
          </ul>

        </div>
        
      </div>
      

    </div>
    
    
  </main>
  

  <script src="script.js"></script>
</body>
</html>
