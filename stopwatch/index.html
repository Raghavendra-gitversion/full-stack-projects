<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Stop Watch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <div class="watch">
        <div class="display">
          <div class="time">
            <div id="hours">
            <h2>00<span>:</span></h2>
            
            </div>
            <div id="minutes">
              <h2>00<span>:</span></h2>
            </div>
            <div id="seconds">
              <h2>00</h2>
            </div>
          </div>
          <div class="buttons">
            <button id="start">Start</button>
            <button id="stop">Stop</button>
            <button id="reset">Reset</button>
          </div>

        </div>
        <div class="footer">
          
          <button id="stopwatch">Stop Watch</button>
        </div>

      </div>
      
    </div>

    <script src="script.js"></script>
  </body>
</html>
