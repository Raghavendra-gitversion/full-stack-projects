<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Sign up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <aside class="pictures">
        <div class="logos">
          <img src="image.jpg" alt="image">
        </div>
        <div class="backcard">
          <div class="logo">
            <img src="odin.png" alt="odin">
            <span>ODIN</span>
          </div>
        </div>
        
        
      </aside>
      <main class="content">
        
        <article class="card">
          <form class="inner-card">
            <div class="left">
              <label for="firstname">FIRST NAME</label>
              <input id="firstname" type="text" name="FIRST NAME" minlength = "3" maxlength="20 " required>
              <label for="email">EMAIL</label>
              <input id="email" type="email" name="email" required>
              <label for="password">PASSWORD</label>
              <input id="password" type="password" name="password" minlength = "8" required>
            </div>
            <div class="right">
              <label for="lastname">LAST NAME</label>
              <input id="lastname" type="text" name="LAST NAME" minlength = "3" maxlength="20 " required>
              <label for="number">PHONE NUMBER</label >
              <input id="number" type="tel" name="phonenumber" minlength = "10" maxlength = "10"required>
              <label for="confirm_password">CONFIRM PASSWORD</label>
              <input id="confirm_password" type="password" name="confirm password" required>
            </div>
          </form>
          
        </article>
        <footer class="outer-card">
          <button type="submit">Create Account</button>
          <p>Already have an account?<span>Log in</span></p>
        </footer>
        
      </main>
    </div>
  </body>

</html>
