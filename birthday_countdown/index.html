<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Happy Birthday</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <h2>COUNTDOWN TO BIRTHDAY</h2>
      <div class="card">
        <div class="days">
          <h1 id="days">0</h1>
          <p>DAYS</p>
        </div>
        <div class="hours">
          <h1 id="hours">0</h1>
          <p>HOURS</p>
        </div>
        <div class="minutes">
          <h1 id="minutes">0</h1>
          <p>MINUTES</p>
        </div>
        <div class="seconds">
          <h1 id="seconds">0</h1>
          <p>SECONDS</p>
        </div>
      </div>
      <div id="birthdayContent" style="display: none;">
        <img src="gunther.jpeg" alt="Friend Photo" class="photo">
        <h1>🎉 Happy Birthday Mawa 🎂</h1>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
